<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <!-- Morning light radiating from center-top -->
    <radialGradient id="bg" cx="50%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="32%" stop-color="#d9f99d"/>
      <stop offset="100%" stop-color="#14532d"/>
    </radialGradient>
    <!-- Light ray gradient (top-to-bottom fade) -->
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </linearGradient>
    <!-- Text panel -->
    <linearGradient id="tp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#041f10"/>
    </linearGradient>
  </defs>

  <!-- Background: forest with morning light -->
  <rect width="1200" height="455" fill="url(#bg)"/>

  <!-- Central light rays -->
  <polygon points="600,0 480,456 720,456" fill="url(#ray)" opacity="0.28"/>
  <polygon points="600,0 355,456 845,456" fill="url(#ray)" opacity="0.14"/>
  <polygon points="600,20 180,456 1020,456" fill="url(#ray)" opacity="0.07"/>
  <!-- Side rays -->
  <polygon points="600,0 150,456 280,456" fill="url(#ray)" opacity="0.1"/>
  <polygon points="600,0 920,456 1050,456" fill="url(#ray)" opacity="0.1"/>

  <!-- Ground layer -->
  <path d="M0,398 Q300,368 600,392 Q900,368 1200,398 L1200,456 L0,456 Z" fill="#052e16"/>
  <path d="M0,432 Q150,420 300,435 Q450,422 600,436 Q750,422 900,435 Q1050,422 1200,432 L1200,456 L0,456 Z" fill="#041f10"/>

  <!-- Fern shapes on ground -->
  <g stroke="#166534" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M80,435 Q58,395 38,378"/>
    <path d="M80,435 Q78,402 92,382"/>
    <path d="M80,435 Q98,400 112,384"/>
    <path d="M155,428 Q132,395 112,378"/>
    <path d="M155,428 Q154,402 168,382"/>
    <path d="M155,428 Q172,402 185,385"/>
    <path d="M1050,432 Q1032,396 1015,378"/>
    <path d="M1050,432 Q1052,402 1068,384"/>
    <path d="M1050,432 Q1068,400 1080,382"/>
    <path d="M1128,428 Q1108,395 1090,378"/>
    <path d="M1128,428 Q1130,402 1145,385"/>
    <path d="M1128,428 Q1148,402 1158,382"/>
  </g>

  <!-- Path/trail on ground -->
  <path d="M520,456 Q555,430 575,405 Q588,385 600,368 Q612,385 625,405 Q645,430 680,456 Z" fill="#062018" opacity="0.55"/>

  <!-- Tree trunks — foreground framing (dark, tall) -->
  <!-- Far-left edge trunk (widest) -->
  <path d="M0,456 L0,30 C4,30 16,40 18,85 C21,135 19,205 20,295 C22,375 18,422 16,456 Z" fill="#062012"/>
  <!-- Second left trunk -->
  <path d="M82,456 L80,172 C83,172 96,178 98,215 C101,255 99,318 98,378 C97,418 95,440 92,456 Z" fill="#0a2812"/>
  <!-- Third left trunk -->
  <path d="M182,456 L180,195 C183,195 194,202 196,238 C198,278 196,342 194,400 C193,432 191,445 188,456 Z" fill="#0e2e14"/>
  <!-- Fourth left (thinner, mid-ground) -->
  <path d="M288,456 L288,242 C290,242 298,246 300,268 C302,302 300,360 298,415 C297,438 295,448 292,456 Z" fill="#12321a"/>
  <!-- Small left mid-ground -->
  <path d="M382,456 L382,288 C382,288 390,290 390,308 C390,332 388,382 386,430 C385,443 383,450 382,456 Z" fill="#163820"/>

  <!-- Right side mirrors -->
  <path d="M1200,456 L1200,30 C1196,30 1184,40 1182,85 C1179,135 1181,205 1180,295 C1178,375 1182,422 1184,456 Z" fill="#062012"/>
  <path d="M1118,456 L1120,172 C1117,172 1104,178 1102,215 C1099,255 1101,318 1102,378 C1103,418 1105,440 1108,456 Z" fill="#0a2812"/>
  <path d="M1018,456 L1020,195 C1017,195 1006,202 1004,238 C1002,278 1004,342 1006,400 C1007,432 1009,445 1012,456 Z" fill="#0e2e14"/>
  <path d="M912,456 L912,242 C910,242 902,246 900,268 C898,302 900,360 902,415 C903,438 905,448 908,456 Z" fill="#12321a"/>
  <path d="M818,456 L818,288 C818,288 810,290 810,308 C810,332 812,382 814,430 C815,443 817,450 818,456 Z" fill="#163820"/>

  <!-- Forest canopy overhead (dark mass, fills top) -->
  <path d="M0,0 L1200,0 L1200,118 Q1050,78 900,98 Q750,68 600,88 Q450,68 300,98 Q150,78 0,118 Z" fill="#062012"/>
  <!-- Extra canopy fills covering the light at extreme corners -->
  <path d="M0,0 L0,95 Q80,58 165,90 Q238,55 330,80 Q400,58 450,80 L450,0 Z" fill="#041808"/>
  <path d="M1200,0 L1200,95 Q1122,58 1038,88 Q965,56 872,80 Q802,58 752,80 L752,0 Z" fill="#041808"/>

  <!-- Hanging branches/moss -->
  <path d="M102,102 Q96,135 80,160 Q68,179 58,184" stroke="#06200e" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M225,96 Q218,138 196,164 Q184,180 174,185" stroke="#06200e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M978,96 Q985,138 1006,164 Q1018,180 1028,185" stroke="#06200e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M1098,102 Q1104,135 1122,160 Q1132,179 1142,182" stroke="#06200e" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Mid-distance mist -->
  <rect x="220" y="285" width="760" height="70" fill="white" opacity="0.04" rx="20"/>

  <!-- Text panel -->
  <rect x="0" y="455" width="1200" height="220" fill="url(#tp)"/>
  <rect x="0" y="455" width="1200" height="3" fill="#a3e635"/>
  <rect x="0" y="458" width="4" height="217" fill="#86efac" opacity="0.9"/>

  <text x="60" y="498" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="700" fill="#a3e635" letter-spacing="3">OUTDOOR EVENT · NATURE</text>
  <text x="60" y="550" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700" fill="white">Morning Nature Walk</text>
  <text x="60" y="589" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="400" fill="#bbf7d0">Bannerghatta Forest Fringe</text>
  <text x="60" y="626" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#a7f3d0">April 26, 2026  ·  6:30 AM – 9:30 AM</text>
  <text x="60" y="656" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#5a8a6a">Bannerghatta National Park fringe, South Bengaluru</text>
</svg>
