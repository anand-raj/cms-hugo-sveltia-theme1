<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6ab4d5"/>
      <stop offset="55%" stop-color="#a8d8e8"/>
      <stop offset="100%" stop-color="#c8ead5"/>
    </linearGradient>
    <linearGradient id="tp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1e10"/>
      <stop offset="100%" stop-color="#0f2212"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="455" fill="url(#sky)"/>

  <!-- Morning sun (slightly right of center high up) -->
  <circle cx="780" cy="82" r="42" fill="#fffde7" opacity="0.55"/>
  <circle cx="780" cy="82" r="28" fill="#fff9c4" opacity="0.8"/>
  <circle cx="780" cy="82" r="18" fill="#fffbea"/>

  <!-- Clouds -->
  <ellipse cx="198" cy="88" rx="102" ry="34" fill="white" opacity="0.62"/>
  <ellipse cx="158" cy="95" rx="68" ry="30" fill="white" opacity="0.56"/>
  <ellipse cx="248" cy="90" rx="75" ry="28" fill="white" opacity="0.52"/>
  <ellipse cx="548" cy="66" rx="82" ry="28" fill="white" opacity="0.5"/>
  <ellipse cx="512" cy="74" rx="55" ry="25" fill="white" opacity="0.46"/>
  <ellipse cx="582" cy="70" rx="60" ry="22" fill="white" opacity="0.44"/>
  <ellipse cx="1052" cy="92" rx="68" ry="24" fill="white" opacity="0.42"/>
  <ellipse cx="1030" cy="99" rx="48" ry="22" fill="white" opacity="0.38"/>

  <!-- Atmospheric mist near horizon -->
  <rect x="0" y="205" width="1200" height="75" fill="white" opacity="0.07"/>
  <rect x="0" y="228" width="1200" height="45" fill="white" opacity="0.05"/>

  <!-- Mountain layers (back to front, getting darker) -->
  <!-- Layer 1: farthest / most desaturated -->
  <path d="M0,315 Q105,222 215,262 Q335,188 462,238 Q562,196 662,222 Q782,196 902,226 Q1012,212 1112,236 Q1162,228 1200,244 L1200,456 L0,456 Z" fill="#b0cec5" opacity="0.65"/>
  <!-- Layer 2: middle distance -->
  <path d="M0,362 Q82,282 182,322 Q298,256 422,298 Q532,260 642,286 Q756,265 862,290 Q972,268 1072,292 Q1142,278 1200,294 L1200,456 L0,456 Z" fill="#7aaa82" opacity="0.78"/>
  <!-- Layer 3: nearer ridge -->
  <path d="M0,392 Q112,338 218,366 Q332,318 458,352 Q570,318 682,344 Q802,322 912,346 Q1022,330 1122,350 Q1168,340 1200,350 L1200,456 L0,456 Z" fill="#4a7a52"/>
  <!-- Foreground treeline (jagged silhouette) -->
  <path d="M0,456 L0,430
    Q30,392 60,425 Q90,390 120,424 Q150,392 180,424
    Q210,390 240,422 Q270,392 300,424 Q330,390 360,422
    Q390,392 420,424 Q450,394 480,424 Q510,395 540,422
    Q570,396 600,424 Q630,396 660,422 Q690,398 720,424
    Q750,400 780,424 Q810,402 840,424 Q870,404 900,425
    Q930,408 960,426 Q990,412 1020,428 Q1050,416 1080,430
    Q1110,420 1140,432 Q1170,424 1200,432
    L1200,456 Z" fill="#1e3a22"/>

  <!-- Text panel -->
  <rect x="0" y="455" width="1200" height="220" fill="url(#tp)"/>
  <rect x="0" y="455" width="1200" height="3" fill="#4ade80"/>
  <rect x="0" y="458" width="4" height="217" fill="#22c55e" opacity="0.9"/>

  <text x="60" y="498" font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="700" fill="#4ade80" letter-spacing="3">OUTDOOR EVENT · TREKKING</text>
  <text x="60" y="550" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="700" fill="white">Kudremukh Trek</text>
  <text x="60" y="589" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-weight="400" fill="#bbf7d0">Two Days in the Western Ghats</text>
  <text x="60" y="626" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" fill="#a7f3d0">May 17–18, 2026  ·  2-Day Trek</text>
  <text x="60" y="656" font-family="Arial, Helvetica, sans-serif" font-size="13.5" fill="#5a8a6a">Kudremukh National Park, Chikkamagaluru, Karnataka</text>
</svg>
