<header class="site-header" id="siteHeader">
  <nav class="site-nav">
    <a class="site-title" href="{{ site.Home.RelPermalink }}">
      <img src="{{ "logo.png" | relURL }}" alt="{{ site.Title }} logo" class="site-logo">
      {{ site.Title }}
    </a>
    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      {{ with site.Menus.main }}
        {{ range . }}
        <li><a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ i18n .Identifier | default .Name }}</a></li>
        {{ end }}
      {{ end }}

    </ul>
  </nav>
</header>
<script>
  (function () {
    var btn = document.querySelector('.nav-toggle');
    var menu = document.querySelector('.nav-links');
    btn.addEventListener('click', function () {
      var open = menu.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', open);
    });

    // Set real header height as CSS variable so sticky offsets are exact
    function setHeaderHeight() {
      var h = document.getElementById('siteHeader').offsetHeight;
      document.documentElement.style.setProperty('--header-h', h + 'px');
    }
    setHeaderHeight();
    window.addEventListener('resize', setHeaderHeight);

    // ── Shrink nav on scroll ─────────────────────────────────────────────────
    var header = document.getElementById('siteHeader');
    var scrolled = false;
    window.addEventListener('scroll', function () {
      if (!scrolled && window.scrollY > 80) {
        header.classList.add('is-scrolled');
        scrolled = true;
      } else if (scrolled && window.scrollY < 40) {
        header.classList.remove('is-scrolled');
        scrolled = false;
      }
    }, { passive: true });
    header.addEventListener('transitionend', setHeaderHeight);
  })();
</script>
